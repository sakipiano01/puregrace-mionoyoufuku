<!DOCTYPE html>

<html lang="ja">

<title>みおちゃんに相談する | PureGrace</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>

    --bg: #fdf8f5;
    --petal: #fff0f0;
    --blush: #fce8e4;
    --rose: #f0d0cc;
    --pink: #e8b4b0;
    --moss: #d8e4d4;
    --sage: #c4d4c0;
    --silk: #f0e8e0;
    --cream: #faf4ee;

    --muted: #9a8f86;
    --light: #c4b8b0;

    --accent2: #a85858;
    --green: #7a9878;

    --bubble-user: #f4f8f2;

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Noto Sans JP’, sans-serif;
background: var(–bg);
color: var(–ink);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;

radial-gradient(ellipse at 15% 10%, rgba(240,208,204,0.35) 0%, transparent 45%),
radial-gradient(ellipse at 85% 15%, rgba(216,228,212,0.3) 0%, transparent 40%),
radial-gradient(ellipse at 80% 85%, rgba(240,232,224,0.35) 0%, transparent 45%);

/* 背景の花びら装飾 */
body::before {
content: ‘🌸’;

top: 12px;
left: 16px;
font-size: 22px;
opacity: 0.18;

}
body::after {
content: ‘🌿’;
position: fixed;
bottom: 20px;
right: 18px;
font-size: 22px;
opacity: 0.18;

}

/* ヘッダー */
header {
width: 100%;
max-width: 500px;
padding: 22px 20px 16px;
text-align: center;

.header-deco {

.subtitle {

.mio-content { flex: 1; min-width: 0; }

.mio-name {

/* 進捗 */
.progress-wrap {

}

.progress-dots {
display: flex;

.progress-dot {

background: var(–pink);
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(200,120,120,0.15);

@keyframes pulse {
0%, 100% { box-shadow: 0 0 0 3px rgba(200,120,120,0.15); }
50% { box-shadow: 0 0 0 5px rgba(200,120,120,0.1); }
}

font-size: 10px;

background: white;
border-radius: 20px;
padding: 18px 20px;
margin-left: 52px;
box-shadow: 0 5px 22px rgba(200,120,120,0.12), 0 1px 4px rgba(0,0,0,0.04);

right: 14px;

.product-material {

letter-spacing: 0.14em;
color: var(–accent);
margin-bottom: 7px;

}

.product-material::before {

font-size: 8px;
}

.product-name {
font-family: ‘Shippori Mincho’, serif;
font-size: 16px;
font-weight: 500;
color: var(–ink);
margin-bottom: 8px;

.product-texture {

.product-bottom {
display: flex;

.product-price {

.product-link {

.product-link:hover {

.trial-badge {
display: inline-flex;

/* PureGraceにない場合 */
.notfound-card {
background: var(–silk);

.notfound-title {

.notfound-text {

/* リスタート */
.restart-wrap {
display: flex;
justify-content: center;
margin-top: 6px;
animation: popIn 0.4s ease both;
}

.restart-btn {
background: white;
border: 1.5px solid var(–rose);
border-radius: 26px;
padding: 11px 28px;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 12px;
color: var(–muted);

letter-spacing: 0.1em;

box-shadow: 0 2px 8px rgba(200,120,120,0.1);

gap: 6px;
}

.restart-btn:hover {
border-color: var(–accent);
color: var(–accent);
background: var(–petal);
transform: translateY(-1px);
}

/* タイピング */
.typing {
display: flex;
gap: 10px;
align-items: flex-start;
animation: popIn 0.3s ease both;
}

.typing-inner {
display: flex;
gap: 6px;
align-items: center;
padding: 15px 20px;
background: var(–bubble-mio);
border: 1.5px solid rgba(200,120,120,0.12);
border-radius: 6px 22px 22px 22px;
box-shadow: 0 3px 12px rgba(200,120,120,0.1);
}

.typing-inner span {
width: 8px;
height: 8px;
border-radius: 50%;
animation: bounce 1.4s ease infinite;
}

.typing-inner span:nth-child(1) { background: var(–pink); }
.typing-inner span:nth-child(2) { background: var(–accent); animation-delay: 0.18s; }
.typing-inner span:nth-child(3) { background: var(–sage); animation-delay: 0.36s; }

@keyframes bounce {
0%, 55%, 100% { transform: translateY(0); opacity: 0.5; }
27% { transform: translateY(-6px); opacity: 1; }
}

@keyframes popIn {
from { opacity: 0; transform: translateY(12px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes fadeIn {

to { opacity: 1; }
}

.bottom-pad { height: 60px; }

/* かわいい区切り */
.cute-divider {
text-align: center;
color: var(–rose);
font-size: 13px;
letter-spacing: 6px;
opacity: 0.7;
margin: 2px 0;
animation: fadeIn 0.5s ease both;
}
</style>

<body>

<header>
  <div class="logo-wrap">
    <span style="font-size:14px">🌸</span>
    <span class="logo">PureGrace</span>
    <span style="font-size:14px">🌿</span>
  </div>
  <div class="header-deco">
    <div class="header-line"></div>
    <span style="font-size:10px;color:var(--pink)">✿</span>
    <div class="header-line right"></div>
  </div>
  <div class="subtitle">みおちゃんに相談する</div>
  <button id="music-btn" onclick="toggleBGM()" style="
    margin-top: 10px;
    background: white;
    border: 1.5px solid var(--rose);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(200,120,120,0.1);
  ">🎵 音楽 OFF</button>
</header>

<div class="chat-wrap">
  <div class="messages" id="messages"></div>
  <div class="bottom-pad"></div>
</div>

<script>

// ===== BGM (Web Audio API) =====
let audioCtx = null;
let bgmNodes = [];
let bgmPlaying = false;
let bgmStarted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// キラキラピアノBGM
// ペンタトニックスケール（C D E G A）高音域でキラキラ感
const SCALE = [
  523.25, 587.33, 659.25, 783.99, 880.00,  // C5 D5 E5 G5 A5
  1046.50, 1174.66, 1318.51, 1567.98,       // C6 D6 E6 G6
  2093.00                                    // C7
];

// メロディパターン（インデックス）
const MELODY = [
  0,2,4,2, 1,3,5,3, 2,4,6,4, 0,2,4,7,
  1,3,5,3, 2,4,6,4, 3,5,7,5, 0,2,4,2
];

// アルペジオ伴奏パターン
const ARPEGGIO = [0,2,4,6, 0,2,4,6, 1,3,5,7, 1,3,5,7];

function playNote(freq, startTime, duration, volume = 0.15, type = 'sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;

  osc.connect(gain);
  gain.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);

  // ピアノっぽいエンベロープ（すっと立ち上がり、じわっと減衰）
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(volume * 0.35, startTime + duration * 0.4);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 1.3);

  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
  bgmNodes.push(osc);
}

// キラキラ装飾音（高音の星のような音）
function playSparkle(startTime) {
  if (!audioCtx) return;
  const sparkleFreqs = [2093, 2349, 2637, 3136];
  sparkleFreqs.forEach((freq, i) => {
    const t = startTime + i * 0.18;
    playNote(freq, t, 0.6, 0.035, 'sine');
  });
}

let loopTimer = null;
let loopCount = 0;

function playBGMLoop() {
  if (!audioCtx || !bgmPlaying) return;

  const now = audioCtx.currentTime;
  const bpm = 52;
  const beat = 60 / bpm;
  const bar = beat * 4;

  // メロディ（8小節ループ）
  MELODY.forEach((noteIdx, i) => {
    const t = now + i * (beat * 0.75);
    const freq = SCALE[noteIdx];
    playNote(freq, t, beat * 0.65, 0.11, 'sine');
  });

  // アルペジオ伴奏（低音・やわらか）
  ARPEGGIO.forEach((noteIdx, i) => {
    const t = now + i * (beat * 1.5);
    const freq = SCALE[noteIdx] * 0.5; // 1オクターブ下
    playNote(freq, t, beat * 1.2, 0.05, 'triangle');
  });

  // キラキラ装飾（4小節ごと）
  playSparkle(now + bar * 2);
  playSparkle(now + bar * 6);

  // 次のループをスケジュール（16拍後）
  const loopDuration = beat * 16 * 1000;
  loopTimer = setTimeout(playBGMLoop, loopDuration - 200);
}

function startBGM() {
  if (bgmPlaying) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  bgmPlaying = true;
  bgmStarted = true;
  playBGMLoop();
  updateMusicBtn(true);
}

function stopBGM() {
  bgmPlaying = false;
  if (loopTimer) clearTimeout(loopTimer);
  bgmNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  bgmNodes = [];
  updateMusicBtn(false);
}

function toggleBGM() {
  if (bgmPlaying) stopBGM();
  else startBGM();
}

function updateMusicBtn(playing) {
  const btn = document.getElementById('music-btn');
  if (!btn) return;
  btn.textContent = playing ? '🎵 音楽 ON' : '🎵 音楽 OFF';
  btn.style.background = playing ? 'var(--blush)' : 'white';
  btn.style.borderColor = playing ? 'var(--accent)' : 'var(--rose)';
  btn.style.color = playing ? 'var(--accent2)' : 'var(--muted)';
}

// 選択肢タップ時にキラキラSE
function playSelectSE() {
  if (!audioCtx || !bgmPlaying) return;
  const now = audioCtx.currentTime;
  [1318.51, 1567.98, 2093.00].forEach((freq, i) => {
    playNote(freq, now + i * 0.06, 0.25, 0.07, 'sine');
  });
}

// 結果表示時のファンファーレ
function playFanfare() {
  if (!audioCtx || !bgmPlaying) return;
  const now = audioCtx.currentTime;
  [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
    playNote(freq, now + i * 0.1, 0.4, 0.1, 'sine');
  });
  playSparkle(now + 0.6);
  playSparkle(now + 1.0);
}

// ===== 商品マッチング =====
function matchProducts() {
  const { season, scene, feel, material, neck, silhouette, sensitive } = state;

  const feelMap = {
    fluffy: ["ふわふわ","やわらか","もっちり"],
    smooth: ["なめらか","すべすべ","光沢"],
    airy: ["さらさら","すべすべ","なめらか"],
    moist: ["しっとり","やわらか","なめらか"]
  };
  const targetFeel = feelMap[feel] || [];

  const seasonMap = { summer: ["spring","summer"], winter: ["autumn","winter"], all: ["spring","summer","autumn","winter"] };
  const targetSeasons = seasonMap[season] || [];

  let scored = products.map(p => {
    let score = 0;

    // 季節（重要度高）
    const seasonOverlap = p.season.filter(s => targetSeasons.includes(s)).length;
    score += seasonOverlap * 2;

    // シーン
    if (p.scene.includes(scene) || p.scene.includes("both") || scene === "both") score += 3;

    // 感触（重要度高）
    const feelOverlap = p.feel.filter(f => targetFeel.includes(f)).length;
    score += feelOverlap * 3;

    // 素材
    if (material === "cotton" && (p.material === "cotton" || p.material === "organic")) score += 3;
    if (material === "silk" && p.material === "silk") score += 4;
    if (material === "any") score += 1;
    if (material === "other") score -= 10; // 該当なし

    // 首元
    if (neck !== "any" && p.neck.includes(neck)) score += 2;
    if (p.neck.includes("any")) score += 1;

    // シルエット
    if (silhouette !== "any" && p.silhouette.includes(silhouette)) score += 2;

    // 敏感肌
    if (sensitive === "very") {
      if (p.material === "organic") score += 3;
      if (p.material === "silk") score += 2;
    }
    if (sensitive === "sometimes") {
      if (p.material === "organic" || p.material === "silk") score += 1;
    }

    return { ...p, score };
  });

  return scored.sort((a, b) => b.score - a.score).slice(0, 3);
}

const messagesEl = document.getElementById("messages");

// スクロール：要素が画面下部に自然に現れるよう、少しだけ下にスクロール
function scrollToNew(el) {
  setTimeout(() => {
    const headerH = document.querySelector('header').offsetHeight;
    const elBottom = el.getBoundingClientRect().bottom;
    const viewH = window.innerHeight;
    // 要素の下端が画面に入っていない場合だけスクロール
    if (elBottom > viewH - 24) {
      const scrollAmt = elBottom - viewH + 80;
      window.scrollBy({ top: scrollAmt, behavior: "smooth" });
    }
  }, 120);
}

function addEl(el) {
  messagesEl.appendChild(el);
  scrollToNew(el);
  return el;
}

async function addMio(text, mood = 'normal', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {

      const div = document.createElement("div");

      div.innerHTML = `

      addEl(div);
      setTimeout(() => {
        const av = div.querySelector('.mio-avatar');
        if (av) av.classList.remove('talking');
      }, 600);
      resolve();
    }, delay);
  });
}

function addUser(text) {

}

function showProgressDots(current, total) {
  const div = document.createElement("div");
  div.className = "progress-wrap";
  let dots = "";
  for (let i = 1; i <= total; i++) {
    if (i < current) dots += `<div class="progress-dot done"></div>`;
    else if (i === current) dots += `<div class="progress-dot current"></div>`;
    else dots += `<div class="progress-dot"></div>`;
  }
  div.innerHTML = `
    <div class="progress-dots">${dots}</div>
    <div class="progress-text">質問 ${current} / ${total}</div>
  `;
  addEl(div);
}

function showChoices(choices, onPick) {
  const div = document.createElement("div");
  div.className = "choices";
  div.id = "active-choices";
  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="btn-emoji">${c.emoji}</span><span>${c.label}</span>`;
    btn.onclick = () => {
      playSelectSE();
      div.remove();
      onPick(c);

  });
  addEl(div);
}

// ===== ステップ実行 =====
async function runStep(index) {
  if (index >= steps.length) {
    await showResult();
    return;
  }

  const step = steps[index];
  const prevKey = index > 0 ? steps[index - 1].key : null;
  const prevVal = prevKey ? state[prevKey] : null;

  const msg = typeof step.mio === "string"
    ? step.mio
    : (prevVal && step.mio[prevVal]) || Object.values(step.mio)[0];

  showTyping();
  // タイピング：最低1.5秒、最大3秒
  const typingTime = 1500 + Math.min(msg.length * 20, 1500);
  await new Promise(r => setTimeout(r, typingTime));
  removeTyping();

  await addMio(msg);
  await new Promise(r => setTimeout(r, 900));
  showProgressDots(step.step, TOTAL_STEPS);

  await new Promise(r => setTimeout(r, 700));
  showChoices(step.choices, async (choice) => {
    addUser(`${choice.emoji} ${choice.label}`);
    state[step.key] = choice.value;
    if (choice.feel) state.feelTags = choice.feel;
    await new Promise(r => setTimeout(r, 900));
    await runStep(index + 1);
  });
}
